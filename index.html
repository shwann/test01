<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企业登录中心</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #6f7d8b;
      --line: rgba(23, 33, 43, 0.12);
      --panel: rgba(255, 255, 255, 0.88);
      --teal: #0f9b8e;
      --blue: #2457d6;
      --coral: #f26a4f;
      --gold: #f5b942;
      --shadow: 0 24px 70px rgba(28, 45, 68, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #eef4f5;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      background:
        radial-gradient(circle at 14% 18%, rgba(242, 106, 79, 0.16), transparent 27%),
        radial-gradient(circle at 86% 12%, rgba(15, 155, 142, 0.2), transparent 30%),
        linear-gradient(135deg, #f7fbfb 0%, #eef4f5 42%, #f6f0e7 100%);
    }

    button,
    input {
      font: inherit;
    }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(239, 247, 245, 0.96)),
        radial-gradient(circle at center, rgba(36, 87, 214, 0.12), transparent 42%);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      width: min(420px, 100%);
      display: grid;
      justify-items: center;
      gap: 22px;
      text-align: center;
    }

    .loader-ring {
      position: relative;
      width: 126px;
      height: 126px;
      display: grid;
      place-items: center;
    }

    .loader-ring::before,
    .loader-ring::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 4px solid transparent;
      animation: spin 1.4s linear infinite;
    }

    .loader-ring::before {
      border-top-color: var(--teal);
      border-right-color: var(--teal);
      box-shadow: 0 0 34px rgba(15, 155, 142, 0.24);
    }

    .loader-ring::after {
      inset: 15px;
      border-bottom-color: var(--coral);
      border-left-color: var(--gold);
      animation-direction: reverse;
      animation-duration: 1.9s;
    }

    .loader-core {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: var(--ink);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loader h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.12;
    }

    .loader p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .progress {
      width: min(280px, 90vw);
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(23, 33, 43, 0.1);
    }

    .progress span {
      display: block;
      width: 45%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--gold), var(--coral));
      animation: loadbar 1.45s ease-in-out infinite;
    }

    .page {
      min-height: 100vh;
      display: grid;
      align-items: center;
      padding: 32px;
    }

    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, 430px);
      gap: 34px;
      align-items: stretch;
    }

    .hero {
      position: relative;
      min-height: 660px;
      padding: clamp(30px, 5vw, 58px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0.28)),
        linear-gradient(160deg, rgba(15, 155, 142, 0.13), rgba(36, 87, 214, 0.08) 52%, rgba(242, 106, 79, 0.14));
      box-shadow: var(--shadow);
      border-radius: 8px;
    }

    .nav {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: clamp(54px, 10vh, 98px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--ink);
      box-shadow: 0 12px 30px rgba(23, 33, 43, 0.18);
    }

    .nav-links {
      display: flex;
      gap: 18px;
      color: #536170;
      font-size: 14px;
      white-space: nowrap;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 670px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 18px;
      color: #20524d;
      font-weight: 700;
      font-size: 14px;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 7px rgba(15, 155, 142, 0.13);
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(42px, 7vw, 78px);
      line-height: 0.98;
      letter-spacing: 0;
      max-width: 720px;
    }

    .hero-copy {
      max-width: 560px;
      margin: 24px 0 0;
      color: #4f5c68;
      font-size: 18px;
      line-height: 1.8;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      max-width: 660px;
      margin-top: 46px;
    }

    .metric {
      min-height: 104px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.58);
      border-radius: 8px;
      backdrop-filter: blur(14px);
    }

    .metric strong {
      display: block;
      margin-bottom: 8px;
      font-size: 28px;
      line-height: 1;
    }

    .metric span {
      color: #647280;
      font-size: 13px;
      line-height: 1.5;
    }

    .visual {
      position: absolute;
      right: -62px;
      bottom: -42px;
      width: min(52vw, 480px);
      aspect-ratio: 1;
      opacity: 0.92;
    }

    .visual::before,
    .visual::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .visual::before {
      inset: 4%;
      border: 2px dashed rgba(36, 87, 214, 0.42);
      animation: spin 14s linear infinite;
    }

    .visual::after {
      inset: 20%;
      background:
        conic-gradient(from 90deg, var(--teal), var(--gold), var(--coral), var(--blue), var(--teal));
      mask: radial-gradient(circle, transparent 49%, #000 51%);
      animation: spin 18s linear infinite reverse;
    }

    .node {
      position: absolute;
      width: 74px;
      height: 74px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 18px 38px rgba(23, 33, 43, 0.16);
      animation: float 4.8s ease-in-out infinite;
    }

    .node-a {
      left: 18%;
      top: 8%;
      background: var(--teal);
    }

    .node-b {
      right: 6%;
      top: 42%;
      background: var(--coral);
      animation-delay: -1.3s;
    }

    .node-c {
      left: 16%;
      bottom: 12%;
      background: var(--blue);
      animation-delay: -2.2s;
    }

    .login-panel {
      min-height: 660px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(28px, 4vw, 42px);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .login-panel h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .login-panel > p {
      margin: 12px 0 30px;
      color: var(--muted);
      line-height: 1.65;
    }

    .field {
      display: grid;
      gap: 9px;
      margin-bottom: 18px;
    }

    .field label {
      color: #32404f;
      font-size: 14px;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.78);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .field input:focus {
      border-color: rgba(15, 155, 142, 0.76);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(15, 155, 142, 0.12);
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 4px 0 24px;
      color: #5c6a78;
      font-size: 14px;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
    }

    .check input {
      width: 17px;
      height: 17px;
      accent-color: var(--teal);
    }

    .link {
      color: #0b766c;
      text-decoration: none;
      font-weight: 700;
    }

    .login-button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      background: linear-gradient(90deg, var(--teal), var(--blue));
      box-shadow: 0 16px 32px rgba(36, 87, 214, 0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 36px rgba(36, 87, 214, 0.26);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 26px 0;
      color: #8994a0;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--line);
    }

    .sso-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .sso-button {
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334150;
      cursor: pointer;
      font-weight: 700;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .sso-button:hover {
      border-color: rgba(15, 155, 142, 0.48);
      transform: translateY(-1px);
    }

    .notice {
      margin-top: 28px;
      padding: 14px 16px;
      border: 1px solid rgba(245, 185, 66, 0.36);
      border-radius: 8px;
      color: #6f5721;
      background: rgba(245, 185, 66, 0.12);
      font-size: 13px;
      line-height: 1.6;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 18px 38px rgba(23, 33, 43, 0.2);
      }
      50% {
        transform: scale(0.92);
        box-shadow: 0 12px 28px rgba(23, 33, 43, 0.16);
      }
    }

    @keyframes loadbar {
      0% {
        transform: translateX(-110%);
      }
      55%,
      100% {
        transform: translateX(230%);
      }
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-18px);
      }
    }

    @media (max-width: 940px) {
      .page {
        padding: 20px;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .hero,
      .login-panel {
        min-height: auto;
      }

      .visual {
        width: 340px;
        opacity: 0.42;
      }
    }

    @media (max-width: 620px) {
      .page {
        padding: 14px;
      }

      .hero,
      .login-panel {
        padding: 24px;
      }

      .nav {
        align-items: flex-start;
        margin-bottom: 48px;
      }

      .nav-links {
        display: none;
      }

      .hero h2 {
        font-size: 42px;
      }

      .hero-copy {
        font-size: 16px;
      }

      .status-row,
      .sso-grid {
        grid-template-columns: 1fr;
      }

      .options {
        align-items: flex-start;
        flex-direction: column;
      }

      .visual {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <section class="loader" id="loader" aria-label="页面加载中">
    <div class="loader-card">
      <div class="loader-ring" aria-hidden="true">
        <div class="loader-core">EP</div>
      </div>
      <div>
        <h1>正在加载工作台</h1>
        <p>同步权限、消息与应用入口，请稍候。</p>
      </div>
      <div class="progress" aria-hidden="true"><span></span></div>
    </div>
  </section>

  <main class="page">
    <div class="shell">
      <section class="hero" aria-labelledby="hero-title">
        <header class="nav">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">E</span>
            <span>Enterprise Platform</span>
          </div>
          <nav class="nav-links" aria-label="快捷入口">
            <span>产品中心</span>
            <span>数据看板</span>
            <span>帮助支持</span>
          </nav>
        </header>

        <div class="hero-content">
          <p class="eyebrow">统一身份认证</p>
          <h2 id="hero-title">登录首页，连接团队所有业务入口</h2>
          <p class="hero-copy">
            面向企业内部场景的登录首页，加载完成后快速进入审批、数据、项目与运营工作台。
          </p>

          <div class="status-row" aria-label="平台状态">
            <div class="metric">
              <strong>24h</strong>
              <span>全天候安全访问与状态守护</span>
            </div>
            <div class="metric">
              <strong>99.9%</strong>
              <span>核心服务可用性监控</span>
            </div>
            <div class="metric">
              <strong>8</strong>
              <span>常用业务系统统一入口</span>
            </div>
          </div>
        </div>

        <div class="visual" aria-hidden="true">
          <div class="node node-a">HR</div>
          <div class="node node-b">BI</div>
          <div class="node node-c">OA</div>
        </div>
      </section>

      <section class="login-panel" aria-labelledby="login-title">
        <h1 id="login-title">欢迎回来</h1>
        <p>使用企业账号登录，继续访问你的工作台。</p>

        <form>
          <div class="field">
            <label for="account">账号</label>
            <input id="account" name="account" type="text" autocomplete="username" placeholder="请输入工号或邮箱">
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入登录密码">
          </div>

          <div class="options">
            <label class="check">
              <input type="checkbox" name="remember">
              <span>记住本设备</span>
            </label>
            <a class="link" href="#">忘记密码？</a>
          </div>

          <button class="login-button" type="submit">登录工作台</button>
        </form>

        <div class="divider">或使用快速登录</div>
        <div class="sso-grid">
          <button class="sso-button" type="button">企业微信</button>
          <button class="sso-button" type="button">单点登录</button>
        </div>

        <p class="notice">安全提示：首次登录请完成多因素认证，离开公共设备前请退出账号。</p>
      </section>
    </div>
  </main>

  <script>
    const loader = document.getElementById("loader");
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const delay = prefersReducedMotion ? 300 : 1600;

    window.addEventListener("load", () => {
      window.setTimeout(() => {
        loader.classList.add("is-hidden");
      }, delay);
    });
  </script>
</body>
</html>
